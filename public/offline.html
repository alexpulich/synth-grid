<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Synth Grid — Offline</title>
    <meta name="theme-color" content="#0a0a0f" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'JetBrains Mono', monospace, system-ui, sans-serif;
        background: #0a0a0f;
        color: #e0e0e0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        padding: 2rem;
      }
      .container { max-width: 400px; }
      h1 { font-size: 1.5rem; margin-bottom: 1rem; color: #fff; }
      p { font-size: 0.95rem; line-height: 1.6; color: #999; }
      .icon { font-size: 3rem; margin-bottom: 1.5rem; }
      button {
        margin-top: 1.5rem;
        padding: 0.6rem 1.5rem;
        background: #333;
        color: #e0e0e0;
        border: 1px solid #555;
        border-radius: 4px;
        font-family: inherit;
        font-size: 0.9rem;
        cursor: pointer;
      }
      button:hover { background: #444; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon" aria-hidden="true">&#x1F50C;</div>
      <h1>You're offline</h1>
      <p>Synth Grid needs a network connection to load. Check your connection and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
